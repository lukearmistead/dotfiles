# Minimal starship prompt
command_timeout = 100
add_newline = false

format = """$directory$git_branch$git_status$python$nodejs$rust$golang$java$ruby$character"""

[character]
success_symbol = "[λ](bold green)"
error_symbol = "[λ](bold red)"

[directory]
truncation_length = 3

[python]
format = '[${virtualenv}](bold yellow) '

[username]
disabled = true

[hostname]
disabled = true

[time]
disabled = true

[cmd_duration]
disabled = true
